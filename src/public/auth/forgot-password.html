<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Forgot password</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <main class="auth-container">
    <h1>Forgot password</h1>

    <form id="forgotForm" class="auth-form">
      <label>
        Email
        <input name="email" type="email" autocomplete="email" required />
      </label>

      <button type="submit" class="primary-btn">Send reset link</button>
      <p class="auth-links">
        <a href="/auth/login.html">Back to login</a>
      </p>

      <p id="msg" class="auth-msg" aria-live="polite"></p>
    </form>
  </main>

  <script>
    const form = document.getElementById("forgotForm");
    const msg = document.getElementById("msg");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      msg.textContent = "";

      const data = Object.fromEntries(new FormData(form).entries());

      try {
        const res = await fetch("/api/auth/forgot-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });

        const out = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(out.message || "Request failed");

        msg.textContent = "A reset link has been sent.";
      } catch (err) {
        msg.textContent = err.message;
      }
    });
  </script>
</body>
</html>
